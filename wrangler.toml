name = "moontvplus"
account_id ="99dfe01fa64520082aed95387c471e19"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
minify = true

# 静态资源配置
# Cloudflare Workers Assets 用于服务静态文件
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "moontvplus"
database_id = "cd31ad16-d22c-499e-a0e4-c1ef37150a12"

[vars]
NODE_ENV = "production"
BUILD_TARGET = "cloudflare"
